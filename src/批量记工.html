<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON解析为表格</title>
    <!-- 本地加载完整的Supabase库 -->
    <script src="./JavaScript/supabase/supabase.min.js"></script>
    <!-- 加载浏览器环境的Supabase配置 -->
    <script src="./JavaScript/supabase/supabase-client.js"></script>
    <!-- 离线同步服务 -->
    <script src="./JavaScript/离线同步/offline-sync-service.js"></script>
    <!-- 同步状态指示器 -->
    <script src="./JavaScript/离线同步/sync-status-indicator.js"></script>
    <!-- tus-js-client用于大文件上传 -->

    <!-- Compressor.js用于图片压缩 -->

    <!-- 中文转拼音库 -->

    <!-- JSON解析服务 -->
    <script src="./JavaScript/批量记工/json-parser-service.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 5px 0 0 5px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0;
            margin-left: 0;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 0 15px;
        }
        .form-row > div {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-row label {
            margin-bottom: 0;
            white-space: nowrap;
            font-weight: bold;
        }
        #projectName {
            background-color: #f8f9fa !important;
            cursor: not-allowed !important;
            color: #6c757d !important;
            border: 1px solid #dee2e6 !important;
            font-weight: 500;
            font-size: 16px !important;
            width: 35%;
            padding: 8px;
            border-radius: 4px;
        }
        #projectName:focus {
            outline: none !important;
            box-shadow: none !important;
            border-color: #dee2e6 !important;
        }
        .required-asterisk {
            color: #ff0000;
            font-weight: bold;
            margin-right: 2px;
        }
        .file-input {
            position: relative;
            display: inline-block;
        }
        .file-input input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        .file-input .file-label {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-input:hover .file-label {
            background-color: #2980b9;
        }
        .file-input .file-name {
            display: none;
        }
        .button-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-left: 15px;
        }
        .batch-button {
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }
        .batch-button:hover {
            background-color: #229954;
        }
        .batch-button.show {
            display: inline-block;
        }
        .validate-button {
            padding: 10px 20px;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }
        .validate-button:hover {
            background-color: #8e44ad;
        }
        .validate-button.show {
            display: inline-block;
        }
        .save-button {
            padding: 10px 20px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }
        .save-button:hover {
            background-color: #d35400;
        }
        .save-button.show {
            display: inline-block;
        }
        .header-info {
            margin-bottom: 10px;
            padding: 0;
            display: none;
        }
        .header-info.show {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        .header-info .date {
            color: #333;
            font-size: 16px;
            font-weight: bold;
            margin-left: 40px;
        }
        .header-info .company {
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }
        .tables-wrapper {
            display: none;
            justify-content: flex-start;
            gap: 25px;
        }
        .tables-wrapper.show {
            display: flex;
        }
        .table-container {
            width: auto;
            max-height: 600px;
            overflow-y: auto;
            border-top: 2px solid #ddd;
        }
        table {
            width: auto;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f2f2f2;
        }

            background-color: #f2f2f2;

        }

        }

        }
        .notification {

            left: 50%;

            padding: 18px 28px;

            color: white;

            display: none;
            z-index: 10000;

            font-size: 16px;

            text-align: center;
        }

            }

                transform: translate(-50%, -50%) scale(1.05);
                opacity: 1;
            }

            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4), 0 8px 20px rgba(239, 68, 68, 0.2);
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);

            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-top: 20px;
        }

            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

                max-width: none !important;
            }

                max-width: none !important;
            }

            }
            .tables-wrapper {

            }
            .table-container:last-child {

            }
            .table-container:first-child {
                width: 100%;
            }
            #input-content-modal {
                padding: 0 !important;
            }
            #input-content-modal .modal-content {
                width: 100% !important;
                height: 100% !important;
                max-width: none !important;
                max-height: none !important;
                margin: 0 !important;
                border-radius: 0 !important;
                padding: 15px !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
            }
            #jsonContentInput {
                flex: 1 !important;
                height: auto !important;
                min-height: 200px !important;
            }
            #doubao-iframe-container {
                height: 100% !important;
            }
        }
        
        #jsonContentInput::placeholder {
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">

    <script>
        // 压缩图片函数
        function processImage(file) {
            return new Promise((resolve, reject) => {
                new Compressor(file, {
                    quality: 0.7,
                    maxWidth: 1920,
                    maxHeight: 1920,
                    convertSize: 500000,
                    success(result) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            resolve({
                                blob: result,
                                dataURL: e.target.result
                            });
                        };
                        reader.readAsDataURL(result);
                    },
                    error(err) {
                        reject(err);
                    }
                });
            });
        }
        window.processImage = processImage;
        
        // 中文转英文的辅助函数 - 使用pinyin-pro库将中文转为拼音
        function convertChineseToEnglish(str) {
            if (!str) {
                return 'image';
            }
            
            let result = str;
            
            try {
                // 检查pinyin-pro库是否可用
                // 修复：pinyin-pro库的正确调用方式是pinyinPro.pinyin()
                if (typeof window.pinyinPro !== 'undefined' && typeof window.pinyinPro.pinyin === 'function') {
                    // 使用正确的调用方式：pinyinPro.pinyin()
                    result = window.pinyinPro.pinyin(result, {
                        tone: false,  // 不带声调
                        type: 'string',  // 返回字符串
                        separator: ''  // 空分隔符，生成连续的拼音
                    });
                    // 手动移除声调符号（库参数tone:false可能不生效）
                    result = result
                        .replace(/[āáǎà]/g, 'a')
                        .replace(/[ōóǒò]/g, 'o')
                        .replace(/[ēéěè]/g, 'e')
                        .replace(/[īíǐì]/g, 'i')
                        .replace(/[ūúǔù]/g, 'u')
                        .replace(/[ǖǘǚǜü]/g, 'v')
                        .replace(/[^a-zA-Z0-9_.-]/g, '_');
                } else {
                    // 如果pinyinPro库不可用，使用简单的中文转拼音映射
                    const pinyinMap = {
                        '你': 'ni', '好': 'hao',
                        '图': 'tu', '片': 'pian',
                        '考': 'kao', '勤': 'qin',
                        '记': 'ji', '工': 'gong',
                        '一': 'yi', '二': 'er', '三': 'san',
                        '四': 'si', '五': 'wu',
                        '六': 'liu', '七': 'qi',
                        '八': 'ba', '九': 'jiu', '十': 'shi'
                    };
                    
                    // 替换中文汉字为拼音
                    let pinyinResult = '';
                    for (let char of result) {
                        if (pinyinMap[char]) {
                            pinyinResult += pinyinMap[char] + '_';
                        } else {
                            pinyinResult += char;
                        }
                    }
                    // 移除末尾的下划线
                    result = pinyinResult.replace(/_$/, '');
                }
            } catch (error) {
                console.error('中文转拼音失败:', error);
            }
            
            // 移除连续的下划线
            result = result.replace(/_+/g, '_');
            
            // 移除开头和结尾的下划线
            result = result.replace(/^_|_$/g, '');
            
            // 确保生成的文件名不为空
            if (!result || result.trim() === '') {
                result = 'image';
            }
            
            return result;
        }

        // 初始化图片上传功能
        function initImageUpload() {
            if (window.imageUploadInitialized) return;
            if (document.getElementById('imageUploadContainer')) {
                window.imageUploadInitialized = true;
                return;
            }
            
            const labels = document.querySelectorAll('label');
            let formGroup = null;
            for (let label of labels) {
                if (label.textContent.includes('图片')) {
                    formGroup = label.closest('div');
                    break;
                }
            }
            if (!formGroup) return;
            
            const container = document.createElement('div');
            container.id = 'imageUploadContainer';
            container.style.display = 'flex';
            container.style.gap = '10px';
            container.style.flexWrap = 'wrap';
            container.style.marginTop = '10px';
            
            const initialItem = document.createElement('div');
            initialItem.className = 'image-upload-item';
            initialItem.innerHTML = `
                <label for="imageUpload" style="display: block; width: 100px; height: 100px; border: 1px dashed #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <span style="font-size: 24px; color: #999;">+</span>
                </label>
            `;
            
            container.appendChild(initialItem);
            formGroup.appendChild(container);
            
            const imageUpload = document.getElementById('imageUpload');
            if (!imageUpload) return;
            
            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    // 获取原始文件名，将中文转为拼音
                    const originalName = file.name;
                    const nameWithoutExt = originalName.substring(0, originalName.lastIndexOf('.'));
                    const ext = originalName.substring(originalName.lastIndexOf('.'));
                    const pinyinName = convertChineseToEnglish(nameWithoutExt) + ext;
                    
                    // 创建一个新的File对象，使用拼音文件名
                    const fileWithPinyinName = new File([file], pinyinName, {
                        type: file.type,
                        lastModified: file.lastModified
                    });
                    
                    // 添加到全局图片数组
                    window.selectedImages.push(fileWithPinyinName);
                    
                    processImage(fileWithPinyinName).then(compressed => {
                        // 给压缩后的blob添加拼音文件名
                        const blobWithPinyinName = new File([compressed.blob], pinyinName, {
                            type: compressed.blob.type
                        });
                        
                        // 替换全局数组中的原始文件为压缩后的带拼音文件名的blob
                        window.selectedImages[window.selectedImages.length - 1] = blobWithPinyinName;
                        
                        const previewItem = document.createElement('div');
                        previewItem.className = 'image-preview-item';
                        previewItem.style.position = 'relative';
                        previewItem.style.width = '100px';
                        previewItem.style.height = '100px';
                        previewItem.style.borderRadius = '4px';
                        previewItem.style.overflow = 'hidden';
                        previewItem.style.border = '1px solid #ddd';
                        previewItem.dataset.fileIndex = window.selectedImages.length - 1;
                        
                        const previewImg = document.createElement('img');
                        previewImg.src = compressed.dataURL;
                        previewImg.style.width = '100%';
                        previewImg.style.height = '100%';
                        previewImg.style.objectFit = 'cover';
                        previewImg.style.cursor = 'pointer';
                        
                        previewImg.addEventListener('click', function() {
                            const modal = document.getElementById('imageModal');
                            modal.innerHTML = `
                                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2001;" 
                                     onclick="if(event.target === this) document.getElementById('imageModal').style.display='none'">
                                    <img id="draggableImage" src="${compressed.dataURL}" 
                                         style="max-width: 90%; max-height: 90%; position: absolute; cursor: move; top: 50%; left: 50%; transform: translate(-50%, -50%);"
                                         ondragstart="return false;">
                                    <button onclick="document.getElementById('imageModal').style.display='none'" 
                                            style="position: fixed; top: 20px; right: 20px; background: #f5222d; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; z-index: 2002;">×</button>
                                </div>
                            `;
                            modal.style.display = 'block';
                            
                            // 图片拖动功能
                            const img = document.getElementById('draggableImage');
                            let isDragging = false;
                            let offsetX, offsetY;
                            let scale = 1;
                            let hasDragged = false;
                            
                            img.addEventListener('mousedown', function(e) {
                                isDragging = true;
                                
                                // 如果是第一次拖动，需要将图片从居中位置转换为绝对位置
                                if (!hasDragged) {
                                    hasDragged = true;
                                    const rect = img.getBoundingClientRect();
                                    const modalRect = img.parentElement.getBoundingClientRect();
                                    
                                    // 计算图片在界面中的绝对位置
                                    offsetX = e.clientX - rect.left;
                                    offsetY = e.clientY - rect.top;
                                    
                                    // 设置绝对位置
                                    img.style.left = rect.left - modalRect.left + 'px';
                                    img.style.top = rect.top - modalRect.top + 'px';
                                    img.style.transform = `scale(${scale})`;
                                } else {
                                    offsetX = e.clientX - img.getBoundingClientRect().left;
                                    offsetY = e.clientY - img.getBoundingClientRect().top;
                                }
                                
                                img.style.cursor = 'grabbing';
                            });
                            
                            document.addEventListener('mousemove', function(e) {
                                if (!isDragging) return;
                                img.style.left = (e.clientX - offsetX) + 'px';
                                img.style.top = (e.clientY - offsetY) + 'px';
                            });
                            
                            document.addEventListener('mouseup', function() {
                                isDragging = false;
                                img.style.cursor = 'move';
                            });
                            
                            // 鼠标滚轮缩放功能
                            img.addEventListener('wheel', function(e) {
                                e.preventDefault();
                                
                                // 获取当前缩放值
                                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                                scale *= delta;
                                
                                // 限制缩放范围
                                scale = Math.min(Math.max(0.5, scale), 3);
                                
                                // 同时应用 translate 和 scale，保持居中
                                img.style.transform = `translate(-50%, -50%) scale(${scale})`;
                            });
                        });
                        
                        const deleteBtn = document.createElement('button');
                        deleteBtn.textContent = '×';
                        deleteBtn.style.position = 'absolute';
                        deleteBtn.style.top = '5px';
                        deleteBtn.style.right = '5px';

                        deleteBtn.style.border = 'none';

                        deleteBtn.style.width = '24px';

                        deleteBtn.style.cursor = 'pointer';
                        deleteBtn.style.display = 'flex';
                        deleteBtn.style.alignItems = 'center';
                        deleteBtn.style.justifyContent = 'center';
                        deleteBtn.style.padding = '0';
                        
                        deleteBtn.addEventListener('click', function() {
                            const fileIndex = parseInt(previewItem.dataset.fileIndex);

                                window.selectedImages.splice(fileIndex, 1);
                                const previewItems = container.querySelectorAll('.image-preview-item');
                                previewItems.forEach((item, idx) => {
                                    if (idx >= fileIndex) {
                                        item.dataset.fileIndex = idx;
                                    }
                                });
                            }
                            previewItem.remove();
                        });
                        
                        previewItem.appendChild(previewImg);
                        previewItem.appendChild(deleteBtn);
                        container.insertBefore(previewItem, initialItem);
                    }).catch(err => {
                        console.error('图片压缩失败:', err);
                    });

                imageUpload.value = '';
            });
            
            window.imageUploadInitialized = true;
        }

                // 将图标从蓝色改为黑色
                iconCell.textContent = '⚫';
                cells.forEach((cell, index) => {
                    // 跳过图标列
                    if (index !== 0) {
                        cell.style.color = '';
                        // 根据data-editable属性恢复编辑状态
                        const editable = cell.getAttribute('data-editable');
                        cell.contentEditable = editable === 'true';
                    }
                });
            } else {
                // 如果不是蓝色，变成蓝色
                row.classList.add('blue-row');
                // 将图标从黑色改为蓝色
                iconCell.textContent = '🔵';
                cells.forEach((cell, index) => {
                    // 跳过图标列
                    if (index !== 0) {
                        cell.style.color = 'blue';
                        // 设置为不可编辑状态
                        cell.contentEditable = false;
                    }
                });
            }
        }
        
        // 保存按钮点击事件
        document.getElementById('saveButton').addEventListener('click', function() {
            const tableBody1 = document.getElementById('tableBody1');
            const tableBody2 = document.getElementById('tableBody2');
            
            // 获取表格上方的项目名称和日期
            const companyName = document.querySelector('.header-info .company')?.textContent || '';
            const dateText = document.querySelector('.header-info .date')?.textContent || '';
            
            const saveData = {
                headerInfo: {
                    company: companyName,
                    date: dateText
                },
                data: []
            };
            
            // 收集第一个表格的数据
            const rows1 = tableBody1.querySelectorAll('tr');
            rows1.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    const isBlue = row.classList.contains('blue-row');
                    saveData.data.push({
                        id: cells[1].textContent.trim(),
                        name: cells[2].textContent.trim(),
                        morning: cells[3].textContent.trim(),
                        afternoon: cells[4].textContent.trim(),
                        overtime: cells[5].textContent.trim(),
                        contract: cells[6].textContent.trim(),
                        isBlue: isBlue,
                        iconColor: cells[0].textContent.trim()
                    });
                }
            });
            
            // 收集第二个表格的数据
            const rows2 = tableBody2.querySelectorAll('tr');
            rows2.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    const isBlue = row.classList.contains('blue-row');
                    saveData.data.push({
                        id: cells[1].textContent.trim(),
                        name: cells[2].textContent.trim(),
                        morning: cells[3].textContent.trim(),
                        afternoon: cells[4].textContent.trim(),
                        overtime: cells[5].textContent.trim(),
                        contract: cells[6].textContent.trim(),
                        isBlue: isBlue,
                        iconColor: cells[0].textContent.trim()
                    });
                }
            });
            
            // 创建JSON文件并下载
            const jsonStr = JSON.stringify(saveData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // 获取表格上方的项目名称和日期作为默认文件名
            const defaultFileName = (companyName || '未知项目') + (dateText ? '-' + dateText : '') + '.json';
            
            a.download = defaultFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
