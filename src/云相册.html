        async function getConstructionLogsFromStorage() {
            try {
                // 等待Supabase初始化完成
                await window.waitForSupabase();

                const projectId = localStorage.getItem('currentProjectId') || '';
                if (!projectId) {
                    return [];
                }

                // 检查是否在线
                if (!navigator.onLine || !window.supabase || typeof window.supabase.from !== 'function') {
                    // 离线状态从localStorage获取
                    const storageKeys = ['constructionLogs', 'construction_logs_cache', `construction_logs_${projectId}`];
                    for (const key of storageKeys) {
                        const savedData = localStorage.getItem(key);
                        if (savedData) {
                            try {
                                const parsedData = JSON.parse(savedData);
                                const records = Array.isArray(parsedData) ? parsedData : (parsedData.records || parsedData.construction_logs || []);
                                return records.filter(r => r.project_id === projectId);
                            } catch (e) {
                                continue;
                            }
                        }
                    }
                    return [];
                }

                // 在线状态，从Supabase获取
                let query = window.supabase
                    .from('construction_logs')
                    .select('*')
                    .eq('project_id', projectId);

                // 如果有日期筛选条件
                if (currentFilters.dateRange) {
                    if (currentFilters.dateRange.start) {
                        query = query.gte('record_date', currentFilters.dateRange.start);
                    }
                    if (currentFilters.dateRange.end) {
                        query = query.lte('record_date', currentFilters.dateRange.end);
                    }
                }

                const { data, error } = await query;

                if (error) {
                    return [];
                }

                // 过滤出有图片的记录
                const records = (data || [])
                    .filter(record => record.image_ids && record.image_ids.length > 0)
                    .map(record => ({
                        ...record,
                        record_type: 'construction'
                    }));

                return records;
            } catch (error) {
                return [];

        // ==================== 图片预览功能 ====================

        // 初始化图片预览功能
        function initImagePreview() {
            const modal = document.getElementById('imagePreviewModal');
            const closeBtn = document.getElementById('closePreviewBtn');
            const img = document.getElementById('previewImage');

            // 关闭按钮事件
            closeBtn.addEventListener('click', closeImagePreview);

            // 点击背景关闭
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeImagePreview();
                }
            });

            // 图片拖动功能
            let isDragging = false;
            let startX, startY;
            let translateX = 0, translateY = 0;
            let scale = 1;

            img.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                img.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateImageTransform(img, translateX, translateY, scale);
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
                img.style.cursor = 'move';
            });

            // 鼠标滚轮缩放功能
            img.addEventListener('wheel', function(e) {
                e.preventDefault();

                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= delta;

                // 限制缩放范围
                scale = Math.min(Math.max(0.5, scale), 3);

                updateImageTransform(img, translateX, translateY, scale);
            });

            // 查看记工按钮事件
            const viewAttendanceBtn = document.getElementById('viewAttendanceBtn');
            if (viewAttendanceBtn) {
                viewAttendanceBtn.addEventListener('click', function() {
                    goToAttendancePage();
                });
            }

            // 查看借支按钮事件
            const viewSettlementBtn = document.getElementById('viewSettlementBtn');
            if (viewSettlementBtn) {
                viewSettlementBtn.addEventListener('click', function() {
                    goToSettlementPage();
                });
            }

            // 查看点工单按钮事件
            const viewWorkOrderBtn = document.getElementById('viewWorkOrderBtn');
            if (viewSettlementBtn) {
                if (currentPhotoCategory === 'settlement') {
                    viewSettlementBtn.style.display = 'inline-block';
                } else {
                    viewSettlementBtn.style.display = 'none';
                }
            }

            if (viewWorkOrderBtn) {
                viewWorkOrderBtn.addEventListener('click', function() {
                    goToWorkOrderPage();
                });
            }

            // 查看记账按钮事件
            const viewAccountBtn = document.getElementById('viewAccountBtn');
            if (viewAccountBtn) {
                viewAccountBtn.addEventListener('click', function() {
                    goToAccountPage();
                });
            }

            // ESC键关闭预览
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeImagePreview();
                }
            });
        }

            img.style.top = '50%';
            img.style.transform = 'translate(-50%, -50%) scale(1)';
            img.style.cursor = 'move';

            const modal = document.getElementById('imagePreviewModal');
            const img = document.getElementById('previewImage');
            const viewAttendanceBtn = document.getElementById('viewAttendanceBtn');
            const viewSettlementBtn = document.getElementById('viewSettlementBtn');

            }

            // 清除保存的额外数据
            if (modal.dataset.extraData) {
                delete modal.dataset.extraData;
            }

            // 隐藏查看记工按钮
            if (viewAttendanceBtn) {
                viewAttendanceBtn.style.display = 'none';
            }

            // 隐藏查看借支按钮
            if (viewSettlementBtn) {
                viewSettlementBtn.style.display = 'none';
            }

            // 隐藏查看施工日志按钮
            if (viewConstructionBtn) {
                viewConstructionBtn.style.display = 'none';
            }
        }

        // 创建查看施工日志按钮
        function createViewConstructionBtn() {
            const previewBottomBar = document.getElementById('previewBottomBar');
            const existingBtn = document.getElementById('viewConstructionBtn');
            if (existingBtn) {
                return existingBtn;
            }

            const btn = document.createElement('button');
            btn.id = 'viewConstructionBtn';
            btn.textContent = '查看施工日志';
            btn.style.display = 'none';
            btn.style.background = '#722ed1';
            btn.style.color = 'white';
            btn.style.border = 'none';
            btn.style.padding = '6px 16px';
            btn.style.borderRadius = '4px';
            btn.style.fontSize = '14px';
            btn.style.cursor = 'pointer';
            btn.style.transition = 'background 0.3s';

            btn.addEventListener('click', function() {
                goToConstructionPage();
            });

            previewBottomBar.appendChild(btn);
            return btn;
        }

        // 跳转到施工日志页面
        function goToConstructionPage() {
            const modal = document.getElementById('imagePreviewModal');
            const imageDate = modal.dataset.currentImageDate;

            if (!imageDate) {
                console.warn('没有当前图片日期，无法跳转');
                return;
            }

            const projectId = localStorage.getItem('currentProjectId');
            const projectName = localStorage.getItem('currentProjectName');

            // 构建URL参数
            const params = new URLSearchParams();
            if (projectName) {
                params.set('project_name', projectName);
            }
            if (projectId) {
                params.set('project_id', projectId);
            }
            params.set('work_date', imageDate);
            params.set('show_detail', 'true');

            // 构建完整URL
            const url = `施工日志.html?${params.toString()}`;

            // 关闭预览并跳转
            closeImagePreview();
            window.open(url, '_self');
        }

        // 从URL参数同步项目信息到localStorage
        function syncProjectFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectName = urlParams.get('project_name');
            const projectId = urlParams.get('project_id');

            if (projectName) {
                localStorage.setItem('currentProjectName', decodeURIComponent(projectName));
            }

            if (projectId) {
                localStorage.setItem('currentProjectId', decodeURIComponent(projectId));
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async function() {
            // 从URL参数同步项目信息
            syncProjectFromUrl();

            // 通知父页面更新标题为"云相册"
            if (window.parent && window.parent !== window) {
                const targetOrigin = window.location.origin || '*';
                window.parent.postMessage({
                    type: 'updateTitle',
                    page: '云相册.html'
                }, targetOrigin);
            }

            setTodayDate();
            setupDateInteraction();
            setupEmployeeListEvents();
            setupDateChangeListener();
            setupEmployeeChangeListener();

            // 初始化图片预览功能
            initImagePreview();

            // 初始化照片分类点击事件
            initPhotoCategoryEvents();

            // 初始化员工选择框为全部员工
            handleSelectedEmployees([], true);

            // 初始化筛选条件（根据日期框和员工选择的默认值）
            initializeFilters();

            // 更新所有分类的图片数量
            await updateAllCategoryCounts();

            // 初始加载照片
            loadAttendancePhotos();
        });

        // 初始化照片分类点击事件
        function initPhotoCategoryEvents() {
            const categoryItems = document.querySelectorAll('.photo-category-item[data-category]');
            categoryItems.forEach(item => {
                item.addEventListener('click', async function() {
                    // 移除所有active状态
                    categoryItems.forEach(i => i.classList.remove('active'));
                    // 添加当前active状态
                    this.classList.add('active');

                    // 获取分类类型
                    const category = this.dataset.category;
                    currentPhotoCategory = category;

                    // 终止之前的加载请求
                    abortPendingRequests();

                    // 先清除旧的照片显示，显示加载状态
                    const photoListContainer = document.querySelector('.photo-list-container');
                    photoListContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">加载中...</div>';

                    // 根据分类加载对应照片
                    switch (category) {
                        case 'work':
                            await loadAttendancePhotos();
                            break;
                        case 'settlement':
                            await loadSettlementPhotos();
                            break;
                        case 'account':
                            await loadAccountPhotos();
                            break;
                        case 'workorder':
                            await loadWorkOrderPhotos();
                            break;
                        case 'construction':
                            await loadConstructionPhotos();
                            break;
                    }
                });
            });
        }

        // 初始化筛选条件
        function initializeFilters() {
            const workDateInput = document.getElementById('workDate');

            // 获取当前项目ID
            currentFilters.projectId = localStorage.getItem('currentProjectId') || '';

            // 根据日期框的值设置日期筛选条件
            if (workDateInput.dataset.selectAll === 'true') {
                // 全部日期
                currentFilters.dateRange = null;
            } else if (workDateInput.dataset.displayValue && workDateInput.dataset.displayValue.includes('~')) {
                // 日期范围
                const dates = workDateInput.dataset.displayValue.split(' ~ ');
                currentFilters.dateRange = {
                    start: dates[0],
                    end: dates[1]
                };
            } else if (workDateInput.value) {
                // 单个日期（默认今天）
                currentFilters.dateRange = {
                    start: workDateInput.value,
                    end: workDateInput.value
                };
            } else {
                currentFilters.dateRange = null;
            }

            // 员工筛选默认为null（全部员工）
            currentFilters.employeeId = null;
        }
    </script>
</body>
</html>
