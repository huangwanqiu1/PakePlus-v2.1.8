                    const projects = JSON.parse(projectsData);
                    const project = projects.find(p => p.project_id === projectId);
                    return project ? project.project_name : null;
                }
                return null;
            } catch (error) {
                console.error('通过project_id获取project_name失败:', error);
                return null;
            }
        }

        // 页面初始化时处理URL参数，填充项目名称
        document.addEventListener('DOMContentLoaded', function() {
            // 检查URL参数中是否有项目ID
            const urlParams = new URLSearchParams(window.location.search);
            const projectIdFromUrl = urlParams.get('project_id');
            
            if (projectIdFromUrl) {
                // 从URL获取到project_id，查询对应的project_name
                const projectName = getProjectNameById(projectIdFromUrl);
                
                if (projectName) {
                    // 直接设置项目名称到输入框
                    const projectNameInput = document.getElementById('projectName');
                    if (projectNameInput) {
                        projectNameInput.value = projectName;
                    }
                    
                    // 保存项目名称和ID到localStorage
                    localStorage.setItem('currentProjectName', projectName);
                    localStorage.setItem('currentProjectId', projectIdFromUrl);
                } else {
                    console.error('未找到对应的项目信息');
                }
            }
        });

        // 绑定保存按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            
            // 初始化图片上传功能
            initializeImageUpload();
            
            const confirmBtn = document.getElementById('confirmAccountBtn');
            
            if (confirmBtn) {
                confirmBtn.addEventListener('click', function() {
                    if (typeof saveProjectFinance === 'function') {
                        saveProjectFinance();
                    } else {
                        console.error('saveProjectFinance 函数未找到');
                    }
                });
            } else {
                console.error('未找到保存按钮');
            }
        });

        // 输入框内容变化时改变背景色
        window.setupInputBackgroundChange = function setupInputBackgroundChange() {
            const inputIds = ['paymentInput', 'amountInput', 'description'];
            
            inputIds.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    // 初始检查
                    updateInputBackground(input);
                    
                    // 绑定输入事件
                    input.addEventListener('input', function() {
                        updateInputBackground(this);
                    });
                    
                    // 绑定失焦事件（处理通过autocomplete填充的情况）
                    input.addEventListener('blur', function() {
                        updateInputBackground(this);
                    });
                }
            });
        }
        
        // 更新输入框背景色
        function updateInputBackground(input) {
            if (input.value.trim() !== '') {
                input.style.backgroundColor = '#e6f7ff'; // 淡蓝色
            } else {
                input.style.backgroundColor = 'white'; // 默认白色
            }
        }

        // 页面加载时设置今天日期
        document.addEventListener('DOMContentLoaded', function() {
            // 调用syncProjectName函数同步项目信息
            syncProjectName();
            
            // 处理从云相册跳转过来的参数
            const urlParams = new URLSearchParams(window.location.search);
            const workDateFromUrl = urlParams.get('work_date');
            const showDetailFromUrl = urlParams.get('show_detail');
            const typeFromUrl = urlParams.get('type');

            // 优先处理明细标签切换
            if (showDetailFromUrl === 'true') {
                const projectDetail = document.getElementById('projectDetail');
                const detailLabel = document.querySelector('label[for="projectDetail"]');
                
                if (projectDetail && detailLabel) {
                    projectDetail.checked = true;
                    detailLabel.classList.add('active');
                    localStorage.setItem('projectDetailSelected', 'true');
                    
                    // 立即更新界面显示，隐藏输入区域
                    const paymentSection = document.getElementById('paymentSection');
                    const amountSection = document.getElementById('amountSection');
                    const descriptionSection = document.getElementById('descriptionSection');
                    const remarkSection = document.getElementById('remarkSection');
                    const imageSection = document.getElementById('imageSection');
                    const bottomButtons = document.querySelector('.bottom-buttons');
                    const detailTableSection = document.getElementById('detailTableSection');
                    
                    if (paymentSection) paymentSection.style.display = 'none';
                    if (amountSection) amountSection.style.display = 'none';
                    if (descriptionSection) descriptionSection.style.display = 'none';
                    if (remarkSection) remarkSection.style.display = 'none';
                    if (imageSection) imageSection.style.display = 'none';
                    if (bottomButtons) bottomButtons.style.display = 'none';
                    if (detailTableSection) detailTableSection.style.display = 'block';

                    // 如果是项目收入明细，隐藏日期选择框
                    if (typeFromUrl === 'income') {
                        const dateInputSection = document.getElementById('dateInputSection');
                        if (dateInputSection) {
                            dateInputSection.style.display = 'none';
                        }
                    }

                    // 延迟触发加载明细数据，确保其他初始化逻辑完成
                    setTimeout(() => {
                        // 尝试调用 projectFinanceDetail 的 loadDetailData
                        if (window.projectFinanceDetail && typeof window.projectFinanceDetail.loadDetailData === 'function') {
                            window.projectFinanceDetail.loadDetailData();
                        } else {
                            console.warn('window.projectFinanceDetail 未就绪，无法自动加载数据');
                        }
                    }, 500);
                }
            }

            // 处理类型选择 (income/expense)
            if (typeFromUrl) {
                if (typeFromUrl === 'income') {
                    const incomeRadio = document.getElementById('projectIncome');
                    const incomeLabel = document.querySelector('label[for="projectIncome"]');
                    const expenseRadio = document.getElementById('projectExpense');
                    const expenseLabel = document.querySelector('label[for="projectExpense"]');
                    
                    if (incomeRadio && incomeLabel && expenseRadio && expenseLabel) {
                        incomeRadio.checked = true;
                        incomeLabel.classList.add('active');
                        expenseRadio.checked = false;
                        expenseLabel.classList.remove('active');
                    }
                } else if (typeFromUrl === 'expense') {
                    const incomeRadio = document.getElementById('projectIncome');
                    const incomeLabel = document.querySelector('label[for="projectIncome"]');
                    const expenseRadio = document.getElementById('projectExpense');
                    const expenseLabel = document.querySelector('label[for="projectExpense"]');
                    
                    if (incomeRadio && incomeLabel && expenseRadio && expenseLabel) {
                        expenseRadio.checked = true;
                        expenseLabel.classList.add('active');
                        incomeRadio.checked = false;
                        incomeLabel.classList.remove('active');
                    }
                }
            }

            // 处理日期
            if (workDateFromUrl) {
                const workDateInput = document.getElementById('workDate');
                if (workDateInput) {
                    workDateInput.value = workDateFromUrl;
                    // 触发change事件以更新相关逻辑
                    workDateInput.dispatchEvent(new Event('change'));
                }
            }
            
            // 通知父页面更新标题为"项目记账"
            if (window.parent && window.parent !== window) {
                // 使用当前页面的origin作为targetOrigin，提高安全性
                const targetOrigin = window.location.origin || '*';
                window.parent.postMessage({
                    type: 'updateTitle',
                    page: '项目记账'
                }, targetOrigin);
            }
            
            // 如果没有从URL获取到日期，则设置为今天
            if (!workDateFromUrl) {
                setTodayDate();
            }
            
            // 如果从URL获取到了日期，延迟设置以覆盖其他逻辑
            if (workDateFromUrl) {
                setTimeout(() => {
                    const workDateInput = document.getElementById('workDate');
                    if (workDateInput) {
                        workDateInput.value = workDateFromUrl;
                        workDateInput.dispatchEvent(new Event('change'));
                    }
                }, 100);
            }
            
            setupDateInteraction();
            
            // 初始化图片上传容器
            initImageUploadContainer();
            
            // 设置输入框背景色变化功能
            setupInputBackgroundChange();

            // 如果不是从云相册跳转过来的，则默认只选中项目支出标签，不选中明细标签
            if (showDetailFromUrl !== 'true') {
                localStorage.removeItem('projectDetailSelected');
            }

            // 明细checkbox的状态管理完全交由project_finance_detail.js处理
            // 这里不再重复绑定事件，避免冲突

            // 页面初始化时同步明细标签状态
            const projectDetail = document.getElementById('projectDetail');
            const detailLabel = document.querySelector('label[for="projectDetail"]');
            if (projectDetail && detailLabel) {
                // 如果是从云相册跳转，前面已经设置过了，这里再次确认
                const savedDetailState = localStorage.getItem('projectDetailSelected') === 'true';
                projectDetail.checked = savedDetailState;

                if (savedDetailState) {
                    detailLabel.classList.add('active');
                } else {
                    detailLabel.classList.remove('active');
                }
            }
            
            // 更新输入区域显示状态的函数
            window.updateInputSectionsDisplay = function updateInputSectionsDisplay() {
                const isDetailActive = document.getElementById('projectDetail').checked;
                const activeWorkType = document.querySelector('input[name="workType"]:checked');
                const isIncome = activeWorkType && activeWorkType.id === 'projectIncome';
                const isExpense = activeWorkType && activeWorkType.id === 'projectExpense';
                const detailTableSection = document.getElementById('detailTableSection');
                const expenseTableHeader = document.getElementById('expenseTableHeader');
                const incomeTableHeader = document.getElementById('incomeTableHeader');
                
                const paymentSection = document.getElementById('paymentSection');
                const amountSection = document.getElementById('amountSection');
                const descriptionSection = document.getElementById('descriptionSection');
                const remarkSection = document.getElementById('remarkSection');
                const imageSection = document.getElementById('imageSection');
                const bottomButtons = document.querySelector('.bottom-buttons');
                const totalAmountDisplay = document.getElementById('totalAmountDisplay');
                const dateInputSection = document.getElementById('dateInputSection');
                
                // 检查是否处于编辑模式
                const confirmBtn = document.getElementById('confirmAccountBtn');
                const isEditMode = confirmBtn && confirmBtn.dataset.editMode === 'true';
                
                if (isDetailActive) {
                    // 明细标签选中
                    if (isIncome || isExpense) {
                        // 同时选中了明细和项目收入/支出
                        // 隐藏所有输入区域和保存按钮
                        if (paymentSection) paymentSection.style.display = 'none';
                        if (amountSection) amountSection.style.display = 'none';
                        if (descriptionSection) descriptionSection.style.display = 'none';
                        if (remarkSection) remarkSection.style.display = 'none';
                        if (imageSection) imageSection.style.display = 'none';
                        if (bottomButtons) bottomButtons.style.display = 'none';
                        
                        // 显示明细表格
                        if (detailTableSection) detailTableSection.style.display = 'block';
                        
                        // 根据工作类型切换表格表头
                        if (isIncome) {
                            // 收入类型，显示收入表头（无付款人，金额为收入金额）
                            expenseTableHeader.style.display = 'none';
                            incomeTableHeader.style.display = 'table-header-group';
                        } else {
                            // 支出类型，显示支出表头（有付款人，金额为支出金额）
                            expenseTableHeader.style.display = 'table-header-group';
                            incomeTableHeader.style.display = 'none';
                        }
                    } else {
                        // 只选中了明细
                        // 隐藏所有输入区域和保存按钮
                        if (paymentSection) paymentSection.style.display = 'none';
                        if (amountSection) amountSection.style.display = 'none';
                        if (descriptionSection) descriptionSection.style.display = 'none';
                        if (remarkSection) remarkSection.style.display = 'none';
                        if (imageSection) imageSection.style.display = 'none';
                        if (bottomButtons) bottomButtons.style.display = 'none';
                        if (detailTableSection) detailTableSection.style.display = 'none';
                        
                        // 隐藏合计？元区域
                        if (totalAmountDisplay) totalAmountDisplay.style.display = 'none';
                    }
                } else {
                    // 明细标签未选中，根据工作类型显示/隐藏
                    // 在编辑模式下，日期输入区域始终显示
                    if (dateInputSection) {
                        dateInputSection.style.display = 'block';
                    }
                    
                    if (paymentSection) {
                        paymentSection.style.display = isIncome ? 'none' : 'flex';
                    }
                    if (amountSection) amountSection.style.display = 'flex';
                    if (descriptionSection) descriptionSection.style.display = 'flex';
                    if (remarkSection) remarkSection.style.display = 'flex';
                    if (imageSection) imageSection.style.display = 'flex';
                    if (bottomButtons) bottomButtons.style.display = 'flex';
                    if (detailTableSection) detailTableSection.style.display = 'none';
                    
                    // 隐藏合计？元区域
                    if (totalAmountDisplay) totalAmountDisplay.style.display = 'none';
                }
                
                // 重新初始化日期选择器，确保多选图标状态正确
                if (typeof initializeDatePicker === 'function') {
                    initializeDatePicker();
                    
                    // 额外确保多选图标可见性
                    setTimeout(() => {
                        ensureMultiSelectIconVisibility();
                    }, 50);
                }
            }
            
            // 页面初始化时检查当前选中的标签，设置所有输入区域的显示状态
            // updateInputSectionsDisplay 内部会调用 initializeDatePicker，所以这里不需要重复调用
            updateInputSectionsDisplay();
            
            // 绑定工作类型选项卡点击事件（只处理非明细标签）
            document.querySelectorAll('.work-type-option:not(.work-type-detail)').forEach(option => {
                option.addEventListener('click', function() {
                    // 使用getAttribute('for')替代this.htmlFor以提高浏览器兼容性
                    const targetId = this.getAttribute('for');
                    
                    // 处理项目支出/收入标签（radio）
                    // 移除所有选项的active类
                    document.querySelectorAll('.work-type-option').forEach(opt => {
                        opt.classList.remove('active');
                    });
                    // 为当前点击的radio选项添加active类
                    this.classList.add('active');
                    
                    // 更新对应的radio输入框的checked状态
                    const radioInput = document.getElementById(targetId);
                    document.querySelectorAll('input[name="workType"]').forEach(input => {
                        input.checked = false;
                    });
                    radioInput.checked = true;
                    
                    // 点击项目支出或项目收入时，取消明细标签的选中状态
                    const detailCheckbox = document.getElementById('projectDetail');
                    const detailLabel = document.querySelector('label[for="projectDetail"]');
                    if (detailCheckbox && detailLabel) {
                        // 取消明细标签的选中状态
                        detailCheckbox.checked = false;
                        detailLabel.classList.remove('active');
                        
                        // 清除localStorage中的明细选中状态
                        localStorage.removeItem('projectDetailSelected');
                    }
                    
                    // 将修改按钮恢复为保存按钮
                    if (window.projectFinanceDetail && typeof window.projectFinanceDetail.changeEditButtonToSave === 'function') {
                        window.projectFinanceDetail.changeEditButtonToSave();
                    }
                    
                    // 如果当前日期是多日期格式或全部状态，重置为今天的日期
                    const workDateInput = document.getElementById('workDate');
                    if (workDateInput) {
                        // 检查是否为多日期格式
                        if (workDateInput.dataset.displayValue && workDateInput.dataset.displayValue.includes('~')) {
                            // 清除多选显示值
                            delete workDateInput.dataset.displayValue;
                            // 设置为今天的日期
                            setTodayDate();
                        }
                        // 检查是否为全部状态
                        else if (workDateInput.dataset.selectAll === 'true') {
                            // 清除全部状态
                            delete workDateInput.dataset.selectAll;
                            // 设置为今天的日期
                            setTodayDate();
                        }
                    }
                    
                    // 根据选中的标签显示或隐藏相关输入区域
                    updateInputSectionsDisplay();
                    
                    // 重置表单
                    resetForm();
                    
                    // 重置后更新输入框背景色
                    setupInputBackgroundChange();
                });
            });
            

        });
        
        // 页面加载完成后初始化实时订阅
        document.addEventListener('DOMContentLoaded', function() {
            
            // 延迟初始化，确保所有资源都已加载
            setTimeout(initRealtimeSubscription, 1000);
        });
        
        // 监听来自父页面的消息，用于实时更新
        window.addEventListener('message', function(event) {
            // 验证消息来源（在本地开发环境中可能无法验证）
            // 在生产环境中应使用具体的域名验证
            
            try {
                if (event.data && typeof event.data === 'object') {
                    switch (event.data.type) {
                        case 'refreshExpenseData':
                            console.log('🔄 收到支出数据刷新指令');
                            // 重新加载支出数据
                            if (window.projectFinanceDetail && typeof window.projectFinanceDetail.loadDetailData === 'function') {
                                window.projectFinanceDetail.loadDetailData();
                                console.log('✅ 已触发支出数据刷新');
                            } else {
                                console.warn('⚠️ projectFinanceDetail.loadDetailData函数不存在');
                            }
                            break;
                        case 'refreshData':
                            console.log('🔄 收到通用数据刷新指令');
                            // 重新加载财务数据
                            if (window.projectFinanceDetail && typeof window.projectFinanceDetail.loadDetailData === 'function') {
                                window.projectFinanceDetail.loadDetailData();
                                console.log('✅ 已触发通用数据刷新');
                            } else {
                                console.warn('⚠️ projectFinanceDetail.loadDetailData函数不存在');
                            }
                            break;
                        default:
                            // 忽略其他类型的消息
                            break;
                    }
                }
            } catch (error) {
                console.error('处理消息时发生错误:', error);
            }
        });
        
        // 初始化实时订阅 - 子页面不需要重复订阅，由首页统一管理
        function initRealtimeSubscription() {
            // 子页面不需要重复订阅，由首页统一管理实时订阅
            // 仅需监听来自父页面的消息即可
        }

        // 预加载项目数据
        async function prefetchProjectData() {
            try {
                // 等待Supabase初始化
                if (typeof window.waitForSupabase === 'function') {
                    await window.waitForSupabase();
                } else {
                    // 简单的重试逻辑
                    let attempts = 0;
                    while (!window.supabase && attempts < 20) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }
                }

                if (!window.supabase) {
                    console.error('Supabase未初始化，无法预加载数据');
                    return;
                }

                const projectId = localStorage.getItem('currentProjectId');
                if (!projectId) return;

                // 1. 清除本地的项目支出记录
                localStorage.removeItem('project_expenses');

                // 2. 获取所有日期的项目支出记录
                const { data, error } = await window.supabase
                    .from('project_expenses')
                    .select('*')
                    .eq('project_id', projectId);

                if (error) {
                    console.error('预加载项目支出数据失败:', error);
                    return;
                }

                if (data) {
                    // 3. 保存到本地存储
                    localStorage.setItem('project_expenses', JSON.stringify(data));
                    
                    // 如果当前已经在明细界面，可能需要刷新显示
                    if (window.projectFinanceDetail && typeof window.projectFinanceDetail.loadDetailData === 'function') {
                        // 检查是否在明细界面
                        const detailSection = document.getElementById('detailTableSection');
                        if (detailSection && detailSection.style.display !== 'none') {
                            window.projectFinanceDetail.loadDetailData();
                        }
                    }
                }

            } catch (error) {
                console.error('预加载过程出错:', error);
            }
        }

        // 在页面加载完成后调用预加载
        document.addEventListener('DOMContentLoaded', prefetchProjectData);

        // 监听实时数据更新事件
        window.addEventListener('realtimeDataUpdated', function(event) {
            const { table, projectId } = event.detail;
            const currentProjectId = localStorage.getItem('currentProjectId');

            // 只处理当前项目的数据更新
            if (projectId !== currentProjectId) {
                return;
            }

            // 如果是结算借支记录或项目支出记录更新，刷新明细数据
            if (table === 'settlement_records' || table === 'project_expenses') {
                console.log(`💰 项目记账收到${table}数据更新，刷新明细数据`);

                // 如果当前已经在明细界面，刷新显示
                if (window.projectFinanceDetail && typeof window.projectFinanceDetail.loadDetailData === 'function') {
                    // 检查是否在明细界面
                    const detailSection = document.getElementById('detailTableSection');
                    if (detailSection && detailSection.style.display !== 'none') {
                        window.projectFinanceDetail.loadDetailData();
                    }
                }
            }
        });
    </script>
