                const projectsData = localStorage.getItem('project_cache_' + userId);
                if (projectsData) {
                    const projects = JSON.parse(projectsData);
                    // 清空现有选项
                    projectSelect.innerHTML = '';
                    
                    // 添加项目选项
                    projects.forEach(project => {
                        const option = document.createElement('option');
                        option.value = project.project_id;
                        option.textContent = project.project_name;
                        projectSelect.appendChild(option);
                    });
                }
                
                // 如果有URL参数中的项目ID，选中对应的项目并设置为不可选
                if (projectIdFromUrl) {
                    projectSelect.value = projectIdFromUrl;
                    
                    // 保存项目ID到localStorage
                    localStorage.setItem('currentProjectId', projectIdFromUrl);
                    
                    // 将项目ID存储到全局变量中，供父页面访问
                    window.selectedProjectId = projectIdFromUrl;
                    
                    // 从项目主页进入时，设置项目选择框为不可选状态
                    projectSelect.disabled = true;
                    projectSelect.style.backgroundColor = '#f8f9fa';
                    projectSelect.style.cursor = 'not-allowed';
                    
                    // 获取选中的项目名称
                    const selectedOption = projectSelect.options[projectSelect.selectedIndex];
                    const selectedProjectName = selectedOption ? selectedOption.textContent : '';
                    
                    // 发送消息给父页面，更新返回列表的标题
                    if (selectedProjectName && projectIdFromUrl) {
                        const targetOrigin = window.location.origin || '*';
                        window.parent.postMessage({
                            type: 'updateTitle',
                            title: `${selectedProjectName} - 统计 (${projectIdFromUrl})`
                        }, targetOrigin);
                    }
                }
                // 如果没有URL参数，但localStorage中有当前项目ID，选中对应的项目
                else {
                    const currentProjectId = localStorage.getItem('currentProjectId');
                    if (currentProjectId) {
                        projectSelect.value = currentProjectId;
                        
                        // 将项目ID存储到全局变量中，供父页面访问
                        window.selectedProjectId = currentProjectId;
                        
                        // 获取选中的项目名称
                        const selectedOption = projectSelect.options[projectSelect.selectedIndex];
                        const selectedProjectName = selectedOption ? selectedOption.textContent : '';
                        
                        // 发送消息给父页面，更新返回列表的标题
                        if (selectedProjectName && currentProjectId) {
                            const targetOrigin = window.location.origin || '*';
                            window.parent.postMessage({
                                type: 'updateTitle',
                                title: `${selectedProjectName} - 统计 (${currentProjectId})`
                            }, targetOrigin);
                        }
                    }
                    // 没有URL参数时，允许选择项目
                    projectSelect.disabled = false;
                }

                // 处理URL参数中的日期、员工ID和工作类型（从云相册跳转过来）
                const dateFromUrl = urlParams.get('date');
                const employeeIdFromUrl = urlParams.get('employee_id');
                const workTypeFromUrl = urlParams.get('work_type');
                const recordTypeFromUrl = urlParams.get('record_type');
                const viewFromUrl = urlParams.get('view');

                if (dateFromUrl || employeeIdFromUrl || workTypeFromUrl || recordTypeFromUrl) {
                    // 延迟执行，等待页面完全初始化
                    setTimeout(async () => {
                        // 设置日期
                        if (dateFromUrl) {
                            const workDateInput = document.getElementById('workDate');
                            if (workDateInput) {
                                workDateInput.value = dateFromUrl;
                                workDateInput.dataset.selectAll = 'false';
                                // 触发日期变更事件
                                workDateInput.dispatchEvent(new Event('change'));
                            }
                        }

                        // 设置工作类型或记录类型
                        const typeToSelect = workTypeFromUrl || recordTypeFromUrl;
                        if (typeToSelect) {
                            // 保存到localStorage
                            localStorage.setItem('selectedTypes', JSON.stringify([typeToSelect]));
                            window.selectedTypes = [typeToSelect];
                            // 使用formatTypeDisplay函数更新类型按钮显示
                            if (window.formatTypeDisplay) {
                                window.formatTypeDisplay([typeToSelect]);
                            }
                        }

                        // 设置员工并切换到明细视图
                        if (employeeIdFromUrl) {
                            // 从localStorage获取员工列表，查找员工名称
                            let employeeName = '';
                            let employeeCode = '';
                            const projectId = projectIdFromUrl || localStorage.getItem('currentProjectId') || '';
                            if (projectId) {
                                const localKey = `employees_${projectId}`;
                                const savedData = localStorage.getItem(localKey);
                                if (savedData) {
                                    try {
                                        const parsedData = JSON.parse(savedData);
                                        const employees = parsedData.employees || [];
                                        const foundEmployee = employees.find(emp => emp.employee_id === employeeIdFromUrl);
                                        if (foundEmployee) {
                                            employeeName = foundEmployee.emp_name || '';
                                            employeeCode = foundEmployee.emp_code || '';
                                        }
                                    } catch (e) {
                                        console.error('解析员工数据失败:', e);
                                    }
                                }
                            }
                            
                            // 创建员工对象
                            const employeeData = {
                                id: employeeIdFromUrl,
                                name: employeeName || '已选员工',
                                empCode: employeeCode
                            };
                            
                            // 保存选中的员工到localStorage
                            localStorage.setItem('selectedEmployees', JSON.stringify([employeeData]));
                            
                            // 使用handleSelectedEmployees函数更新按钮显示
                            if (typeof handleSelectedEmployees === 'function') {
                                handleSelectedEmployees([employeeData], false);
                            } else {
                                // 如果函数还未定义，手动更新按钮
                                const employeeListBtn = document.getElementById('employeeListBtn');
                                const employeeClearBtn = document.getElementById('employeeClearBtn');
                                if (employeeListBtn) {
                                    const displayName = employeeName || '已选员工';
                                    employeeListBtn.textContent = `${displayName} | 共1人`;
                                }
                                if (employeeClearBtn) {
                                    employeeClearBtn.style.display = 'inline-block';
                                }
                            }
                        }

                        // 切换到明细视图并加载员工记录
                        if (viewFromUrl === 'detail') {
                            // 折叠筛选条件区域
                            const filterToggleBtn = document.getElementById('filterToggleBtn');
                            const filterStickyContainer = document.querySelector('.filter-sticky-container');
                            if (filterToggleBtn && filterStickyContainer) {
                                // 添加折叠类，旋转按钮
                                filterStickyContainer.classList.add('filter-collapsed');
                                filterToggleBtn.classList.add('rotated');
                            }

                            // 更新首页标题为"流水明细"
                            const targetOrigin = window.location.origin || '*';
                            window.parent.postMessage({
                                type: 'updateTitle',
                                page: '流水明细'
                            }, targetOrigin);

                            // 加载员工记录
                            if (employeeIdFromUrl && window.workerCardClickHandler) {
                                setTimeout(() => {
                                    window.workerCardClickHandler.showEmployeeFlowRecords(employeeIdFromUrl, '', '');
                                }, 500);
                            }
                        }

                        // 刷新统计数据
                        if (window.workerStatistic && window.workerStatistic.debouncedLoadStatisticData) {
                            window.workerStatistic.debouncedLoadStatisticData();
                        }
                    }, 300);
                }

                // 添加项目选择框的change事件监听器，当选择变更时刷新数据
                projectSelect.addEventListener('change', function() {
                    // 保存当前选择的项目ID到localStorage
                    const selectedProjectId = this.value;
                    localStorage.setItem('currentProjectId', selectedProjectId);
                    
                    // 将项目ID存储到全局变量中，供父页面访问
                    window.selectedProjectId = selectedProjectId;
                    
                    // 获取选中的项目名称
                    const selectedOption = this.options[this.selectedIndex];
                    const selectedProjectName = selectedOption ? selectedOption.textContent : '';
                    
                    // 发送消息给父页面，更新返回列表的标题
                    if (selectedProjectName && selectedProjectId) {
                        const targetOrigin = window.location.origin || '*';
                        window.parent.postMessage({
                            type: 'updateTitle',
                            title: `${selectedProjectName} - 统计 (${selectedProjectId})`
                        }, targetOrigin);
                    }
                    
                    // 刷新统计数据
                    if (window.workerStatistic && window.workerStatistic.debouncedLoadStatisticData) {
                        window.workerStatistic.debouncedLoadStatisticData();
                    }
                });
            }
            
            // 初始化日期选择框为"全部"状态
            const workDateInput = document.getElementById('workDate');
            if (workDateInput) {
                // 设置日期输入框的显示值为"全部"
                workDateInput.value = '';
                delete workDateInput.dataset.displayValue;
                workDateInput.dataset.selectAll = 'true';
                
                // 更新显示
                updateDateDisplay();
            }
            
            // 设置日期交互
            setupDateInteraction();

            // 设置员工列表按钮事件
            setupEmployeeListEvents();

            // 设置类型选择模态框
            setupTypeModal();

            // 设置筛选条件折叠按钮事件
            const filterToggleBtn = document.getElementById('filterToggleBtn');
            const filterStickyContainer = document.querySelector('.filter-sticky-container');

            if (filterToggleBtn && filterStickyContainer) {
                filterToggleBtn.addEventListener('click', function() {
                    // 切换折叠状态
                    filterStickyContainer.classList.toggle('filter-collapsed');
                    // 切换按钮旋转状态
                    this.classList.toggle('rotated');
                });
            }
        });

        // 设置员工列表按钮事件
        function setupEmployeeListEvents() {
            const employeeListBtn = document.getElementById('employeeListBtn');
            const employeeListModal = document.getElementById('employeeListModal');
            const closeBtn = document.getElementById('closeEmployeeListModal');
            const confirmBtn = document.getElementById('confirmEmployeeSelection');
            const selectAllBtn = document.getElementById('selectAllEmployees');
            const resetBtn = document.getElementById('resetEmployeeSelection');
            const toggleSettledBtn = document.getElementById('toggleSettledEmployees');
            const employeeClearBtn = document.getElementById('employeeClearBtn');
            
            // 显示员工列表模态框
            employeeListBtn.addEventListener('click', function() {
                employeeListModal.style.display = 'flex';
                loadEmployees();
            });
            
            // 员工清除按钮点击事件
            employeeClearBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡，防止触发按钮点击
                
                // 处理选中的员工，传入空数组，标记为全部选中
                handleSelectedEmployees([], true);
                
                // 更新清除按钮显示
                employeeClearBtn.style.display = 'none';

            });
            
            // 关闭模态框
            function closeModal() {
                employeeListModal.style.display = 'none';
            }
            
            // 关闭按钮点击事件
            closeBtn.addEventListener('click', function() {
                closeModal();
                // 触发过滤器变更处理
                if (window.workerStatistic && window.workerStatistic.bindFilterEvents) {
                    // 延迟触发，确保DOM更新完成
                    setTimeout(() => {
                        const workDateInput = document.getElementById('workDate');
                        if (workDateInput) {
                            workDateInput.dispatchEvent(new Event('change', { bubbles: true }));
                        }
                    }, 100);
                }
            });
            
            // 确定按钮点击事件
            confirmBtn.addEventListener('click', function() {
                // 获取所有员工和选中的员工
                const allEmployees = document.querySelectorAll('.employee-item');
                const selectedEmployeeItems = Array.from(document.querySelectorAll('.employee-item.selected'));
                
                // 判断是否全部选中
                const isAllSelected = allEmployees.length > 0 && selectedEmployeeItems.length === allEmployees.length;
                
                // 处理选中的员工
                const selectedEmployees = selectedEmployeeItems.map(item => ({
                    id: item.dataset.id,
                    name: item.dataset.name,
                    empCode: item.dataset.empCode
                }));
                
                handleSelectedEmployees(selectedEmployees, isAllSelected);
                
                // 关闭模态框
                closeModal();

            });
            
            // 全选按钮点击事件
            selectAllBtn.addEventListener('click', function() {
                const employeeItems = document.querySelectorAll('.employee-item');
                const allSelected = Array.from(employeeItems).every(item => item.classList.contains('selected'));
                
                if (allSelected) {
                    // 取消全选
                    employeeItems.forEach(item => {
                        item.classList.remove('selected');
                    });
                    selectAllBtn.textContent = '全选';
                } else {
                    // 全选
                    employeeItems.forEach(item => {
                        item.classList.add('selected');
                    });
                    selectAllBtn.textContent = '取消全选';
                }
            });
            
            // 重置按钮点击事件
            resetBtn.addEventListener('click', function() {
                const employeeItems = document.querySelectorAll('.employee-item');
                employeeItems.forEach(item => {
                    item.classList.remove('selected');
                });
                // 更新全选按钮文本
                updateSelectAllButton();
            });
            
            // 切换显示结清员工按钮点击事件
            toggleSettledBtn.addEventListener('click', function() {
                // 切换状态
                showSettledEmployees = !showSettledEmployees;
                
                // 更新按钮样式或图标
                const icon = this.querySelector('span');
                if (showSettledEmployees) {
                    icon.textContent = '👁️‍🗨️'; // 睁眼带斜杠，表示隐藏
                    this.title = '隐藏结清员工';
                } else {
                    icon.textContent = '👁️'; // 睁眼，表示显示
                    this.title = '显示结清员工';
                }
                
                // 重新加载员工列表
                loadEmployees();
            });
            
            // 点击模态框外部关闭
            employeeListModal.addEventListener('click', function(e) {
                if (e.target === employeeListModal) {
                    closeModal();
                }
            });
        }
        
        // 加载员工数据
        async function loadEmployees() {
            const employeeList = document.getElementById('employeeList');
            employeeList.innerHTML = '<div style="text-align: center; color: #6c757d; padding: 20px;">加载中...</div>';
            
            try {
                // 从localStorage加载员工数据
                const employees = await getEmployeesFromLocalStorage();
                
                // 保存原始员工数据
                originalEmployees = employees;
                
                // 根据showSettledEmployees变量过滤员工数据
                const filteredEmployees = showSettledEmployees ? employees : employees.filter(employee => {
                    const status = employee.状态 || employee.status || '';
                    return status !== '结清';
                });
                
                // 渲染员工列表
                renderEmployeeList(filteredEmployees);
                
                // 初始化员工筛选功能
                initEmployeeSearch();
            } catch (error) {
                console.error('加载员工数据失败:', error);
                employeeList.innerHTML = '<div style="text-align: center; color: #dc3545; padding: 20px;">加载员工数据失败</div>';
            }
        }
        
        // 从localStorage获取员工数据
        function getEmployeesFromLocalStorage() {
            return new Promise((resolve, reject) => {
                try {
                    // 获取当前项目ID
                    const projectId = localStorage.getItem('currentProjectId') || '';
                    
                    if (!projectId) {
                        resolve([]);
                        return;
                    }
                    
                    // 从localStorage加载数据 - 使用项目ID作为键名以确保一致性
                    const localKey = `employees_${projectId}`;
                    const savedData = localStorage.getItem(localKey);
                    
                    let employees = [];
                    if (savedData) {
                        const parsedData = JSON.parse(savedData);
                        employees = parsedData.employees || [];
                    }
                    
                    // 按工号emp_code升序排序（数字排序）
                    employees.sort((a, b) => {
                        const codeA = parseInt(a.emp_code) || 0;
                        const codeB = parseInt(b.emp_code) || 0;
                        return codeA - codeB;
                    });
                    
                    resolve(employees);
                } catch (error) {
                    console.error('从localStorage获取员工数据失败:', error);
                    resolve([]);
                }
            });
        }
        
        // 渲染员工列表
        function renderEmployeeList(employees) {
            const employeeList = document.getElementById('employeeList');
            
            if (employees.length === 0) {
                employeeList.innerHTML = '<div style="text-align: center; color: #6c757d; padding: 20px;">暂无员工数据</div>';
                return;
            }
            
            let html = '';
            employees.forEach(employee => {
                const hasPhone = employee.phone && employee.phone.trim() !== '';
                const status = employee.状态 || employee.status || '';
                const showStatus = ['离职', '隐藏', '结清'].includes(status);
                html += `
                    <div class="employee-item" data-id="${employee.employee_id}" data-name="${employee.emp_name}" data-emp-code="${employee.emp_code}">
                        <div class="employee-info">
                            <div class="employee-id">${employee.emp_code}</div>
                            <div class="employee-details">
                                <div class="employee-name">${employee.emp_name}</div>
                                ${hasPhone ? `<div class="employee-phone">${employee.phone}</div>` : ''}
                            </div>
                            ${showStatus ? `<div class="employee-status">${status}</div>` : ''}
                        </div>
                    </div>
                `;
            });
            
            employeeList.innerHTML = html;
            
            // 恢复之前选中的员工状态
            restoreSelectedEmployees();
            
            // 添加员工选择事件
            addEmployeeSelectionEvents();
        }
        
        // 添加员工选择事件
        function addEmployeeSelectionEvents() {
            const employeeItems = document.querySelectorAll('.employee-item');
            
            employeeItems.forEach(item => {
                item.addEventListener('click', function() {
                    this.classList.toggle('selected');
                    // 更新全选按钮状态
                    updateSelectAllButton();
                });
            });
        }
        
        // 更新全选按钮文本
        function updateSelectAllButton() {
            const selectAllBtn = document.getElementById('selectAllEmployees');
            const employeeItems = document.querySelectorAll('.employee-item');
            const allSelected = Array.from(employeeItems).every(item => item.classList.contains('selected'));
            
            selectAllBtn.textContent = allSelected ? '取消全选' : '全选';
        }
        
        // 保存原始员工数据
        let originalEmployees = [];
        
        // 是否显示结清的员工
        let showSettledEmployees = false;
        
        // 恢复之前选中的员工状态
        function restoreSelectedEmployees() {
            try {
                const savedSelected = localStorage.getItem('selectedEmployees');
                if (savedSelected) {
                    const selectedEmployees = JSON.parse(savedSelected);
                    const employeeItems = document.querySelectorAll('.employee-item');
                    
                    employeeItems.forEach(item => {
                        const empId = item.dataset.id;
                        const isSelected = selectedEmployees.some(emp => emp.id === empId);
                        if (isSelected) {
                            item.classList.add('selected');
                        }
                    });
                }
                
                // 更新全选按钮状态
                updateSelectAllButton();
            } catch (error) {
                console.error('恢复选中员工状态失败:', error);
            }
        }
        
        // 初始化员工筛选功能
        function initEmployeeSearch() {
            const searchInput = document.getElementById('employeeSearchInput');
            
            // 添加输入事件监听器
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.trim().toLowerCase();
                
                // 先根据搜索词筛选员工
                let filteredEmployees;
                if (!searchTerm) {
                    filteredEmployees = originalEmployees;
                } else {
                    filteredEmployees = originalEmployees.filter(employee => {
                        const empCode = employee.emp_code || '';
                        const empName = employee.emp_name || '';
                        return empCode.toLowerCase().includes(searchTerm) || empName.toLowerCase().includes(searchTerm);
                    });
                }
                
                // 再根据showSettledEmployees变量筛选，排除结清的员工
                if (!showSettledEmployees) {
                    filteredEmployees = filteredEmployees.filter(employee => {
                        const status = employee.状态 || employee.status || '';
                        return status !== '结清';
                    });
                }
                
                renderEmployeeList(filteredEmployees);
            });
        }
        
        // 处理选中的员工
        function handleSelectedEmployees(employees, isAllSelected = false) {
            // 根据选中的员工更新按钮文本
            const employeeListBtn = document.getElementById('employeeListBtn');
            const employeeClearBtn = document.getElementById('employeeClearBtn');
            
            // 保存选中的员工到localStorage
            if (isAllSelected) {
                // 如果是全部选中，清空localStorage中的员工选择
                localStorage.removeItem('selectedEmployees');
            } else {
                // 否则保存选中的员工
                const selectedEmployeesData = employees.map(emp => ({
                    id: emp.id,
                    name: emp.name,
                    empCode: emp.empCode
                }));
                localStorage.setItem('selectedEmployees', JSON.stringify(selectedEmployeesData));
            }
            
            // 更新按钮文本
            if (employees.length === 0 || isAllSelected) {
                // 如果没有选中员工或者全部选中，显示"全部员工"和▼
                employeeListBtn.textContent = '全部员工 ▼';
                employeeClearBtn.style.display = 'none';
            } else {
                // 获取选中的员工姓名列表
                const employeeNames = employees.map(emp => emp.name);
                
                // 生成显示文本，最多显示两个姓名，超过用...代替，然后添加共多少人
                let displayText;
                if (employeeNames.length <= 2) {
                    displayText = `${employeeNames.join(' | ')} | 共${employees.length}人`;
                } else {
                    displayText = `${employeeNames[0]} | ${employeeNames[1]} | ... | 共${employees.length}人`;
                }
                
                // 非默认状态，只显示文本，不显示▼
                employeeListBtn.textContent = displayText;
                employeeClearBtn.style.display = 'inline-block';
            }
            
            // 根据当前选中的标签执行相应操作
            if (window.workerStatistic) {
                // 检查当前选中的标签
                const activeTab = document.querySelector('.work-type-option.active');
                const isDetailTab = activeTab && activeTab.id === 'detailOption';
                
                if (isDetailTab) {
                    // 如果是明细标签，重新加载流水记录
                    try {
                        // 检查是否有保存的员工选择
                        const savedEmployees = localStorage.getItem('selectedEmployees');
                        if (savedEmployees) {
                            const selectedEmployees = JSON.parse(savedEmployees);
                            if (selectedEmployees && selectedEmployees.length > 0) {
                                const employee = selectedEmployees[0];
                                if (employee.id && employee.name && employee.empCode) {
                                    // 检查WorkerCardClickHandler是否已初始化
                                    if (window.workerCardClickHandler) {
                                        window.workerCardClickHandler.showEmployeeFlowRecords(employee.id, employee.name, employee.empCode);
                                    } else if (window.WorkerCardClickHandler) {
                                        // 如果还未初始化，创建实例并调用方法
                                        const handler = new window.WorkerCardClickHandler(window.workerStatistic);
                                        window.workerCardClickHandler = handler;
                                        handler.showEmployeeFlowRecords(employee.id, employee.name, employee.empCode);
                                    }
                                }
                            } else {
                                // 如果没有选中员工，清空明细视图
                                const container = document.getElementById('statisticResults');
                                if (container) {
                                    container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">请点击工人卡片查看明细记录</div>';
                                }
                            }
                        } else {
                            // 如果localStorage中没有保存的员工选择，清空明细视图
                            const container = document.getElementById('statisticResults');
                            if (container) {
                                container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">请点击工人卡片查看明细记录</div>';
                            }
                        }
                    } catch (error) {
                        console.error('重新加载流水记录失败:', error);
                    }
                } else {
                    // 如果是工人或合计标签，重新加载统计数据
                    window.workerStatistic.debouncedLoadStatisticData();
                }
            }

        }
    </script>

    <script src="./JavaScript/统计/export_pdf.js"></script>

    <!-- 本地加载完整的Supabase库 -->
    <script src="./JavaScript/supabase/supabase.min.js"></script>
    <!-- 加载浏览器环境的Supabase配置 -->
    <script src="./JavaScript/supabase/supabase-client.js"></script>

    <!-- 引入统计功能JS文件 -->
    <script src="./JavaScript/统计/statistic.js"></script>
    <!-- 引入员工卡片点击功能JS文件 -->
    <script src="./JavaScript/统计/worker-card-click.js"></script>
    <script>
        // 确保workerStatistic初始化完成后再初始化点击事件处理器
        function initWorkerCardClick() {
            if (window.workerStatistic) {
                new window.WorkerCardClickHandler(window.workerStatistic);
            } else {
                // 如果还没有初始化，50毫秒后重试
                setTimeout(initWorkerCardClick, 50);
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('load', initWorkerCardClick);
        
        // 页面加载完成后初始化实时订阅
        document.addEventListener('DOMContentLoaded', function() {
            
            // 延迟初始化，确保所有资源都已加载
            setTimeout(initRealtimeSubscription, 1000);
        });
        
        // 监听来自父页面的消息，用于实时更新
        window.addEventListener('message', function(event) {
            // 验证消息来源（在本地开发环境中可能无法验证）
            // 在生产环境中应使用具体的域名验证
            
            try {
                if (event.data && typeof event.data === 'object') {
                    switch (event.data.type) {
                        case 'refreshData':
                        case 'refreshAttendanceData':
                        case 'refreshEmployeeData':
                        case 'refreshSettlementData':
                        case 'refreshExpenseData':
                            // 触发日期选择器的change事件，利用现有的筛选条件变化处理逻辑
                            const workDateInput = document.getElementById('workDate');
                            if (workDateInput) {
                                const changeEvent = new Event('change', { bubbles: true });
                                workDateInput.dispatchEvent(changeEvent);
                            } else {
                                console.warn('⚠️ 未找到日期选择器元素');
                            }
                            break;
                        default:
                            // 忽略其他类型的消息
                            break;
                    }
                }
            } catch (error) {
                console.error('处理消息时发生错误:', error);
            }
        });
        
        // 初始化实时订阅 - 子页面不需要重复订阅，由首页统一管理
        function initRealtimeSubscription() {
            // 子页面不需要重复订阅，由首页统一管理实时订阅
            // 仅需监听来自父页面的消息即可
        }
    </script>
</body>
</html>
