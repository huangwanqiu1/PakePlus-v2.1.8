<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 10px;
        }
        
        .container {
            width: 100%;
            margin: 0;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 15px;
        }
        
        /* 统计结果容器 - 可滚动区域 */
        .statistic-results {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding: 0;
        }
        
        /* 筛选条件容器的粘性定位 */
        .filter-sticky-container {
            position: sticky;
            top: 0;
            background-color: #fff;
            z-index: 10;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
            margin-bottom: 10px;
        }
        
        /* 工人/合计标签的粘性定位 */
        .work-type {
            position: sticky;
            top: auto;
            background-color: #fff;
            z-index: 10;
            margin-bottom: 10px;
            margin-top: 15px;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 0 15px;
        }
        
        .form-row > div {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-row label {
            margin-bottom: 0;
            white-space: nowrap;
        }
        
        /* 工作类型标签样式，参考结算借支.html */
        .work-type {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            padding: 0 15px;
        }
        
        .work-type-option {
            cursor: pointer;
            padding: 8px 16px;
            position: relative;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.1);
            margin: 2px;
        }
        
        .work-type-option:hover {
            transform: translateY(-1px) scale(1.05);
            background: rgba(114, 46, 209, 0.2);
            box-shadow: 0 4px 12px rgba(114, 46, 209, 0.3);
        }
        
        .work-type-option.active {
            color: white;
            background: linear-gradient(135deg, rgba(114, 46, 209, 0.9), rgba(147, 51, 234, 0.8));
            box-shadow: 0 4px 15px rgba(114, 46, 209, 0.4);
            transform: translateY(-1px);
        }
        
        .work-type-option.active:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(114, 46, 209, 0.5);
        }
        
        .work-type-option.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #722ed1;
        }
        
        /* 筛选条件折叠按钮样式 */
        .filter-toggle-btn {
            cursor: pointer;
            padding: 8px 12px;
            position: relative;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.1);
            margin: 2px;
            border: none;
            color: #333;
        }

        /* 下载按钮样式 */
        .download-btn {
            position: relative;
        }

        .download-btn:hover::after {
            content: '下载';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #333;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 100;
        }

        .download-btn:hover {
            background: rgba(114, 46, 209, 0.1);
        }
        
        .filter-toggle-btn:hover {
            transform: translateY(-1px) scale(1.05);
            background: rgba(114, 46, 209, 0.2);
            box-shadow: 0 4px 12px rgba(114, 46, 209, 0.3);
        }
        
        /* 筛选条件折叠状态 */
        .filter-sticky-container.filter-collapsed .form-row {
            display: none;
        }

        /* 筛选条件折叠时，统计结果容器高度调整 */
        .filter-sticky-container.filter-collapsed ~ .statistic-results {
            max-height: calc(100vh - 120px);
        }
        
        /* 旋转动画 - 默认朝下（折叠状态），旋转后朝上（展开状态） */
        .filter-toggle-btn {
            transform: rotate(0deg); /* 默认朝下 */
        }
        
        .filter-toggle-btn.rotated {
            transform: rotate(180deg); /* 朝上 */
        }
        
        input[type="text"], select, input[type="date"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f5f5f5;
        }
        
        /* 项目名称选择框样式 */
        #projectName {
            background-color: #f5f5f5 !important;
            cursor: pointer !important;
            color: #333 !important;
            border: 1px solid #ddd !important;
            font-weight: 500;
            font-size: 16px !important;
        }
        
        #projectName:focus {
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2) !important;
            border-color: #1890ff !important;
        }
        
        /* 必填项星号样式 */
        .required-asterisk {
            color: #ff0000;
            font-weight: bold;
            margin-right: 2px;
        }
        
        /* 日期输入框容器样式 */
        .date-input-container {
            position: relative;
            width: 100%;
        }
        
        .date-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f5f5f5;
            position: relative;
            z-index: 1;
        }
        
        .date-display {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 8px;
            border: 1px solid #1890ff;
            border-radius: 4px;
            background-color: #e6f7ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
            pointer-events: none;
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #333;
            z-index: 2;
        }
        
        .date-display .today-text {
            color: #1890ff;
            font-weight: bold;
        }
        
        /* 隐藏原始日期输入框 */
        .date-input-container.active .date-input {
            opacity: 1;
            z-index: 3;
        }
        
        .date-input-container.active .date-display {
            opacity: 0;
        }
        
        /* 日期选择器模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .date-picker-content {
            background-color: white;
            border-radius: 12px;
            width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        
        .date-picker-body {
            padding: 20px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .calendar-header button {
            background: linear-gradient(135deg, rgba(240, 240, 240, 0.8), rgba(255, 255, 255, 0.6));
            border: none;
            border-radius: 8px;
            width: auto;
            height: 36px;
            padding: 0 12px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        /* 为月份导航按钮保持固定宽度 */
        #prevMonth,
        #nextMonth {
            width: 36px;
            padding: 0;
        }
        
        /* 筛选按钮样式 */
        .filter-btn {
            background: linear-gradient(135deg, rgba(230, 247, 255, 0.8), rgba(240, 250, 255, 0.6));
            border: 1px solid #91d5ff;
            border-radius: 8px;
            padding: 8px 35px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 5px;
            position: relative;
        }
        
        .filter-btn:hover {
            background: linear-gradient(135deg, rgba(24, 144, 255, 0.9), rgba(64, 169, 255, 0.8));
            color: white;
            transform: translateY(-1px) scale(1.05);
            box-shadow: 0 4px 15px rgba(24, 144, 255, 0.4);
        }
        
        /* 员工列表模态框样式 */
        #employeeListModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        
        #employeeListModal .modal-content {
            background-color: white;
            border-radius: 12px;
            width: 400px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        
        #employeeListModal .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            flex-shrink: 0;
            position: relative;
        }
        
        #employeeListModal .modal-title {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #343a40;
            align-self: flex-start;
        }
        
        /* 搜索图标样式 */
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 14px;
            pointer-events: none;
        }
        
        /* 筛选输入框样式 */
        #employeeSearchInput {
            padding: 8px 12px 8px 32px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
        }
        
        #employeeSearchInput::placeholder {
            color: #adb5bd;
        }
        
        #employeeSearchInput:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }
        
        #employeeListModal .modal-header-actions {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }
        
        #employeeListModal .modal-header-select-buttons {
            display: flex;
            gap: 10px;
        }
        
        #employeeListModal .modal-header-buttons {
            display: flex;
            gap: 10px;
        }
        
        #employeeListModal .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            padding: 0;
            z-index: 1000;
            position: relative;
        }
        
        #employeeListModal .close-btn:hover {
            color: #ef4444;
            background-color: #fee2e2;
            transform: rotate(90deg);
        }
        
        #employeeListModal .modal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        
        /* 员工列表样式 */
        #employeeList {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .employee-item {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            font-size: 14px;
            height: auto;
        }
        
        .employee-item:hover {
            background-color: #f8f9fa;
            border-color: #1890ff;
        }
        
        .employee-item.selected {
            background: none;
            border-color: #e9ecef;
        }
        
        .employee-item.selected .employee-id::after {
            content: '✓';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background-color: #f5222d;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }
        
        .employee-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            position: relative;
            width: 100%;
        }
        
        .employee-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }
        
        .employee-id {
            background-color: #f0f0f0;
            color: #666;
            width: 45px;
            height: 45px;
            border-radius: 3px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border: 1px solid #ddd;
            position: relative;
        }
        
        .employee-phone {
            color: #6c757d;
            font-size: 12px;
            margin-top: 2px;
        }
        
        .employee-status {
            color: #f5222d;
            font-size: 12px;
            padding: 4px 8px;
            background-color: #fff1f0;
            border: 1px solid #ffccc7;
            border-radius: 4px;
        }
        
        .employee-item.selected .employee-id {
            background-color: #1890ff;
            color: white;
            border: 2px solid #ff7a45;
        }
        
        .employee-name {
            color: #343a40;
            font-size: 16px;
        }
        
        #employeeListModal .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        #employeeListModal .btn-primary {
            background-color: #1890ff;
            color: white;
        }
        
        #employeeListModal .btn-primary:hover {
            background-color: #40a9ff;
        }
        
        #employeeListModal .btn-secondary {
            background-color: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
        }
        
        #employeeListModal .btn-secondary:hover {
            background-color: #bbdefb;
            color: #1565c0;
        }
        
        /* 类型选择模态框样式 */
        #typeListModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        
        #typeListModal .modal-content {
            background-color: white;
            border-radius: 12px;
            width: 400px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
        
        #typeListModal .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: flex-start;
            position: relative;
        }
        
        #typeListModal .modal-title {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #343a40;
        }
        
        #typeListModal .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            padding: 0;
            z-index: 1000;
            position: absolute;
            top: 15px;
            right: 20px;
        }
        
        #typeListModal .close-btn:hover {
            color: #ef4444;
            background-color: #fee2e2;
            transform: rotate(90deg);
        }
        
        #typeListModal .modal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        
        #typeListModal .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        #typeListModal .btn-primary {
            background-color: #1890ff;
            color: white;
        }
        
        #typeListModal .btn-primary:hover {
            background-color: #40a9ff;
        }
        
        /* 未选中类型按钮样式 - 文字颜色改为黑色 */
        #typeListModal .type-item.btn-secondary {
            background-color: #f5f5f5;
            color: #000000;
            border: 1px solid #ddd;
        }
        
        #typeListModal .type-item.btn-secondary:hover {
            background-color: #e9ecef;
            color: #333;
        }
        
        /* 重置和确定按钮样式保持不变 */
        #typeListModal .btn-secondary {
            background-color: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
        }
        
        #typeListModal .btn-secondary:hover {
            background-color: #bbdefb;
            color: #1565c0;
        }
        
        /* 类型项选中状态 - 更换为橙色系 */
        #typeListModal .type-item.selected {
            background-color: #ff7a00;
            color: white;
            border-color: #ff7a00;
        }
        
        #typeListModal .type-item.selected:hover {
            background-color: #ff9500;
            border-color: #ff9500;
        }
        
        .calendar-header button:hover {
            background: linear-gradient(135deg, rgba(24, 144, 255, 0.9), rgba(64, 169, 255, 0.8));
            color: white;
            transform: translateY(-1px) scale(1.15);
            box-shadow: 0 4px 15px rgba(24, 144, 255, 0.4);
        }
        
        #currentMonth {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            min-width: 100px;
            text-align: center;
        }
        
        .calendar-grid {
            margin-bottom: 20px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
        }
        
        .weekdays > div {
            text-align: center;
            padding: 8px;
            font-weight: bold;
            color: #666;
            font-size: 14px;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        
        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .day-cell:hover {
            background: linear-gradient(135deg, rgba(230, 247, 255, 0.8), rgba(240, 250, 255, 0.6));
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .day-cell.other-month {
            color: #ccc;
            cursor: not-allowed;
        }
        
        .day-cell.disabled-future {
            color: #d0d0d0;
            background-color: #f9f9f9;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .day-cell.disabled-future:hover {
            background-color: #f9f9f9;
            transform: none;
        }
        
        .day-cell.today {
            background: #fff2e6;
            border: 2px solid #ff7a00;
            font-weight: bold;
            color: #ff7a00;
            position: relative;
        }
        
        .day-cell.today::before {
            content: '今天';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff7a00;
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 1;
        }
        
        .day-cell.selected-single {
            background: #1890ff;
            color: white;
            font-weight: bold;
        }
        
        /* 多选模式选中日期样式 */
        .day-cell.selected-multi {
            background: linear-gradient(135deg, #52c41a, #389e0d);
            color: white;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(82, 196, 26, 0.3);
            transform: scale(1.05);
        }
        
        /* 多选模式日期范围样式 */
        .day-cell.selected-range {
            background: linear-gradient(135deg, #95de64, #73d13d);
            color: white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(149, 222, 100, 0.2);
        }
        
        #multiSelectInfo {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f8ff;
            border-radius: 6px;
            display: none;
        }
        
        #multiSelectInfo span {
            color: #1890ff;
            font-size: 12px;
        }
        
        /* 月份选择器样式 */
        .month-picker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2001;
        }
        
        .month-picker {
            background-color: white;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;

        /* 移动端适配样式 */

            /* 调整work-type容器的间距 */

    </style>
</head>

    <script>
        // 格式化日期为显示格式
        function formatDateForDisplay(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${year}年${parseInt(month)}月${parseInt(day)}日`;
        }

        // 更新日期显示（在框内显示今天标识）
        function updateDateDisplay() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedToday = `${yyyy}-${mm}-${dd}`;
            const workDateInput = document.getElementById('workDate');
            const dateDisplay = document.getElementById('dateDisplay');
            const container = document.querySelector('.date-input-container');
            
            // 检查是否为"全部"状态
            if (workDateInput.dataset.selectAll === 'true') {
                dateDisplay.innerHTML = '全部';
                dateDisplay.classList.remove('today');
                workDateInput.removeAttribute('data-today');
                // 清除其他显示值
                delete workDateInput.dataset.displayValue;
                return;
            }
            
            if (workDateInput.value) {
                // 检查是否有多选日期的显示值
                let displayText;
                if (workDateInput.dataset.displayValue) {
                    // 多选模式，使用格式化后的显示值
                    displayText = workDateInput.dataset.displayValue;
                } else {
                    // 单选模式，格式化单个日期
                    displayText = formatDateForDisplay(workDateInput.value);
                    
                    // 检查是否为今天
                    if (workDateInput.value === formattedToday) {
                        displayText += '<span class="today-text">（今天）</span>';
                    }
                }
                
                dateDisplay.innerHTML = displayText;
                
                // 检查是否为今天（只在单选模式下检查）
                if (!workDateInput.dataset.displayValue && workDateInput.value === formattedToday) {
                    dateDisplay.classList.add('today');
                    workDateInput.setAttribute('data-today', 'true');
                } else {
                    dateDisplay.classList.remove('today');
                    workDateInput.removeAttribute('data-today');
                }
            } else {
                dateDisplay.innerHTML = '请选择日期';
                dateDisplay.classList.remove('today');
                workDateInput.removeAttribute('data-today');
                // 清除多选显示值和其他状态
                delete workDateInput.dataset.displayValue;
                delete workDateInput.dataset.selectAll;
            }
        }

        // 设置当前日期到日期输入框并添加"今天"标识
        function setTodayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedToday = `${yyyy}-${mm}-${dd}`;
            const workDateInput = document.getElementById('workDate');
            
            // 设置默认日期为今天
            workDateInput.value = formattedToday;
            
            // 更新显示
            updateDateDisplay();
        }
        
        // 处理日期输入框交互
        function setupDateInteraction() {
            const workDateInput = document.getElementById('workDate');
            const container = document.querySelector('.date-input-container');
            
            // 点击显示区域时激活输入框或打开日期选择器
            const dateDisplay = document.getElementById('dateDisplay');
            dateDisplay.addEventListener('click', function() {
                showDatePicker();
            });
            
            // 输入框点击时打开日期选择器
            workDateInput.addEventListener('click', function(e) {
                e.preventDefault();
                showDatePicker();
            });
            
            // 防止原生日期输入框获得焦点
            workDateInput.addEventListener('focus', function(e) {
                e.preventDefault();
                this.blur(); // 立即失去焦点
                showDatePicker();
            });
            
            // 日期改变时更新显示
            workDateInput.addEventListener('change', function() {
                updateDateDisplay();
            });
        }
        
        // 全局变量：选中的类型列表，用于记住选择状态
        window.selectedTypes = [];
        
        // 格式化类型显示文本 - 全局函数
        window.formatTypeDisplay = function(types) {
            const typeBtn = document.getElementById('typeBtn');
            const typeClearBtn = document.getElementById('typeClearBtn');
            
            if (typeBtn) {
                if (types.length === 0) {
                    // 默认状态
                    typeBtn.innerHTML = '类型 ▼';
                    if (typeClearBtn) {
                        typeClearBtn.style.display = 'none';
                    }
                } else {
                    // 非默认状态，显示类型和X按钮
                    let displayText;
                    if (types.length <= 3) {
                        displayText = `${types.join(' | ')}`;
                    } else {
                        displayText = `${types.slice(0, 3).join(' | ')} | ...`;
                    }
                    typeBtn.innerHTML = displayText;
                    if (typeClearBtn) {
                        typeClearBtn.style.display = 'inline-block';
                    }
                }
            }
        };
        
        // 从localStorage初始化选中的类型
        try {
            const savedTypes = localStorage.getItem('selectedTypes');
            if (savedTypes) {
                window.selectedTypes = JSON.parse(savedTypes);
                // 更新类型按钮显示
                window.formatTypeDisplay(window.selectedTypes);
            }
        } catch (error) {
            console.error('初始化类型选择失败:', error);
        }
        
        // 类型选择模态框处理
        function setupTypeModal() {
            // 类型按钮点击事件
            const typeBtn = document.getElementById('typeBtn');
            const typeModal = document.getElementById('typeListModal');
            const closeTypeModalBtn = document.getElementById('closeTypeListModal');
            const confirmTypeBtn = document.getElementById('confirmTypeSelection');
            const resetTypeBtn = document.getElementById('resetTypeSelection');
            const typeClearBtn = document.getElementById('typeClearBtn');
            
            // 获取所有类型项
            const typeItems = document.querySelectorAll('.type-item');
            
            // 工人、合计和明细标签点击事件处理
            const workTypeOptions = document.querySelectorAll('.work-type-option');
            workTypeOptions.forEach(option => {
                option.addEventListener('click', function() {
                    // 移除所有选项的active类
                    workTypeOptions.forEach(opt => {
                        opt.classList.remove('active');
                    });
                    // 为当前点击的选项添加active类
                    this.classList.add('active');

                    // 根据选中的标签执行不同的逻辑
                    if (this.id === 'workerOption') {
                        // 隐藏明细标签
                        const detailOption = document.getElementById('detailOption');
                        if (detailOption) {
                            detailOption.style.display = 'none';
                        }
                        // 切换到工人视图
                        if (window.workerStatistic) {
                            window.workerStatistic.switchView('worker');
                        }
                    } else if (this.id === 'totalOption') {
                        // 隐藏明细标签
                        const detailOption = document.getElementById('detailOption');
                        if (detailOption) {
                            detailOption.style.display = 'none';
                        }
                        // 切换到合计视图
                        if (window.workerStatistic) {
                            window.workerStatistic.switchView('total');
                        }
                    } else if (this.id === 'detailOption') {
                        // 切换到明细视图
                        if (window.workerStatistic) {
                            window.workerStatistic.switchView('detail');
                        }
                    }
                });
            });
            
            // 类型清除按钮点击事件
            typeClearBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡，防止触发按钮点击
                
                // 清空选中类型
                selectedTypes = [];
                
                // 更新按钮显示为默认值
                typeBtn.innerHTML = '类型 ▼';
                typeClearBtn.style.display = 'none';
                
                // 清空localStorage
                localStorage.removeItem('selectedTypes');
                
                // 触发过滤器变更处理
                if (window.workerStatistic && window.workerStatistic.bindFilterEvents) {
                    // 延迟触发，确保DOM更新完成
                    setTimeout(() => {
                        const workDateInput = document.getElementById('workDate');
                        if (workDateInput) {
                            workDateInput.dispatchEvent(new Event('change', { bubbles: true }));
                        }
                    }, 100);
                }

            });
            
            // 显示类型模态框并恢复之前的选择状态
            typeBtn.addEventListener('click', function() {
                // 恢复之前的选择状态
                typeItems.forEach(item => {
                    const type = item.dataset.type;
                    if (window.selectedTypes.includes(type)) {
                        item.classList.add('selected');
                        item.classList.add('btn-primary');
                        item.classList.remove('btn-secondary');
                    } else {
                        item.classList.remove('selected');
                        item.classList.remove('btn-primary');
                        item.classList.add('btn-secondary');
                    }
                });
                
                typeModal.style.display = 'flex';
            });
            
            // 关闭类型模态框
            closeTypeModalBtn.addEventListener('click', function() {
                typeModal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            typeModal.addEventListener('click', function(e) {
                if (e.target === typeModal) {
                    typeModal.style.display = 'none';
                }
            });
            
            // 类型选择事件 - 支持多选
            typeItems.forEach(item => {
                item.addEventListener('click', function() {
                    const type = this.dataset.type;
                    const index = window.selectedTypes.indexOf(type);
                    
                    if (index > -1) {
                        // 取消选择
                        window.selectedTypes.splice(index, 1);
                        this.classList.remove('selected');
                        this.classList.remove('btn-primary');
                        this.classList.add('btn-secondary');
                    } else {
                        // 添加选择
                        window.selectedTypes.push(type);
                        this.classList.add('selected');
                        this.classList.remove('btn-secondary');
                        this.classList.add('btn-primary');
                    }
                });
            });
            
            // 重置选择
            resetTypeBtn.addEventListener('click', function() {
                window.selectedTypes = [];
                typeItems.forEach(item => {
                    item.classList.remove('selected');
                    item.classList.remove('btn-primary');
                    item.classList.add('btn-secondary');
                });
            });
            
            // 确定选择
            confirmTypeBtn.addEventListener('click', function() {
                // 更新类型按钮文本
                window.formatTypeDisplay(window.selectedTypes);
                
                // 保存选中的类型到localStorage
                localStorage.setItem('selectedTypes', JSON.stringify(window.selectedTypes));
                
                // 关闭模态框
                typeModal.style.display = 'none';
                
                // 根据当前选中的标签执行相应操作
                if (window.workerStatistic) {
                    // 检查当前选中的标签
                    const activeTab = document.querySelector('.work-type-option.active');
                    const isDetailTab = activeTab && activeTab.id === 'detailOption';
                    
                    if (isDetailTab) {
                    // 如果是明细标签，重新加载流水记录
                    try {
                        // 检查是否有保存的员工选择
                        const savedEmployees = localStorage.getItem('selectedEmployees');
                        if (savedEmployees) {
                            const selectedEmployees = JSON.parse(savedEmployees);
                            if (selectedEmployees && selectedEmployees.length > 0) {
                                // 检查WorkerCardClickHandler是否已初始化
                                if (window.workerCardClickHandler) {
                                    if (selectedEmployees.length === 1) {
                                        // 如果只有一名员工，使用原来的方法
                                        const employee = selectedEmployees[0];
                                        if (employee.id && employee.name && employee.empCode) {

        // 渲染日历
        function renderCalendar() {
            const currentMonthEl = document.getElementById('currentMonth');
            const calendarDays = document.getElementById('calendarDays');
            
            const year = datePickerState.displayDate.getFullYear();
            const month = datePickerState.displayDate.getMonth();
            
            // 更新月份显示
            currentMonthEl.textContent = `${year}年${month + 1}月`;
            
            // 更新月份切换按钮状态
            updateMonthNavigationButtons(year, month);
            
            // 清空日历
            calendarDays.innerHTML = '';
            
            // 获取当月第一天和最后一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            // 调整星期计算：0(日)转为6，1-6(一-六)转为0-5
            const firstDayOfWeek = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            const daysInMonth = lastDay.getDate();
            
            // 获取上个月的最后几天
            const prevMonth = new Date(year, month - 1, 0);
            const daysInPrevMonth = prevMonth.getDate();
            
            // 渲染上个月的日期
            for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const dateStr = formatDate(year, month - 1, day);
                const dayEl = createDayElement(day, true, dateStr);
                calendarDays.appendChild(dayEl);
            }
            
            // 渲染当月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = formatDate(year, month, day);
                const dayEl = createDayElement(day, false, dateStr);
                calendarDays.appendChild(dayEl);
            }
            
            // 渲染下个月的日期（填满网格）
            const totalCells = calendarDays.children.length;
            const remainingCells = 42 - totalCells; // 6周 * 7天
            for (let day = 1; day <= remainingCells; day++) {
                const dateStr = formatDate(year, month + 1, day);
                const dayEl = createDayElement(day, true, dateStr);
                calendarDays.appendChild(dayEl);
            }
        }
        
        // 更新月份导航按钮状态

            const nextMonthBtn = document.getElementById('nextMonth');
            
            // 如果下个月大于当前月，禁用下个月按钮
            if (year > currentYear || (year === currentYear && month >= currentMonth)) {
                nextMonthBtn.disabled = true;
                nextMonthBtn.style.opacity = '0.3';
                nextMonthBtn.style.cursor = 'not-allowed';
                nextMonthBtn.style.background = '#f0f0f0';

            }
        }
        
        // 农历转换函数 - 将公历日期转换为大写农历（只返回日）
        function getLunarCalendar(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            
            // 简化的农历转换（实际项目中可以使用更完整的农历库）
            const lunarDays = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                              '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                              '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
            
            // 简化的农历计算
            const offset = (year - 2000) * 12 + month;
            const lunarDayIndex = (day + offset) % 30;
            
            return `${lunarDays[lunarDayIndex]}`;
        }
        
        // 创建日期元素
        function createDayElement(day, isOtherMonth, dateStr) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day-cell';
            dayEl.dataset.date = dateStr;
            
            // 创建日期和农历的容器
            const dayContent = document.createElement('div');
            dayContent.style.display = 'flex';
            dayContent.style.flexDirection = 'column';
            dayContent.style.alignItems = 'center';
            dayContent.style.justifyContent = 'center';
            dayContent.style.height = '100%';
            dayContent.style.padding = '5px';
            
            // 添加日期数字
            const dayNumber = document.createElement('span');
            dayNumber.textContent = day;
            dayNumber.style.fontSize = '14px';
            dayNumber.style.fontWeight = 'bold';
            dayContent.appendChild(dayNumber);
            
            // 添加农历
            if (!isOtherMonth) {
                const lunarCalendar = getLunarCalendar(dateStr);
                const lunarElement = document.createElement('span');
                lunarElement.textContent = lunarCalendar;
                lunarElement.style.fontSize = '10px';
                lunarElement.style.color = '#999';
                lunarElement.style.marginTop = '2px';
                dayContent.appendChild(lunarElement);
            }
            
            dayEl.appendChild(dayContent);
            
            if (isOtherMonth) {
                dayEl.classList.add('other-month');
                return dayEl;
            }
            
            // 检查是否为今天
            const today = new Date();
            const todayStr = formatDate(today.getFullYear(), today.getMonth(), today.getDate());
            if (dateStr === todayStr) {
                dayEl.classList.add('today');
            }
            
            // 检查是否大于今天（禁用未来日期）
            const selectedDate = new Date(dateStr + 'T00:00:00');
            if (selectedDate > today) {
                dayEl.classList.add('disabled-future');
                dayEl.style.cursor = 'not-allowed';
                return dayEl; // 不添加点击事件
            }
            
            // 检查选中状态（单选模式）
            if (!datePickerState.isMultiSelect && dateStr === datePickerState.singleSelectedDate) {
                dayEl.classList.add('selected-single');
            }
            
            // 检查选中状态（多选模式）
            if (datePickerState.isMultiSelect && datePickerState.multiSelectedDates.includes(dateStr)) {
                dayEl.classList.add('selected-multi');
            }
            
            // 添加点击事件（只对非禁用日期）
            dayEl.addEventListener('click', () => selectDate(dateStr));
            
            return dayEl;
        }
        
        // 选择日期
        function selectDate(dateStr) {
            if (datePickerState.isMultiSelect) {
                // 多选模式
                const index = datePickerState.multiSelectedDates.indexOf(dateStr);
                if (index > -1) {
                    // 如果已选中，则取消选择
                    datePickerState.multiSelectedDates.splice(index, 1);
                } else {
                    // 如果未选中，则添加到选择数组
                    if (datePickerState.multiSelectedDates.length < 2) {
                        datePickerState.multiSelectedDates.push(dateStr);
                        // 排序确保日期顺序正确
                        datePickerState.multiSelectedDates.sort();
                    } else {
                        // 如果已选择两个日期，替换第一个
                        datePickerState.multiSelectedDates[0] = datePickerState.multiSelectedDates[1];
                        datePickerState.multiSelectedDates[1] = dateStr;
                    }
                }
                
                // 更新显示
                if (datePickerState.multiSelectedDates.length === 2) {
                    const startDate = datePickerState.multiSelectedDates[0];
                    const endDate = datePickerState.multiSelectedDates[1];
                    const workDateInput = document.getElementById('workDate');
                    workDateInput.value = startDate;
                    workDateInput.dataset.displayValue = `${startDate} ~ ${endDate}`;
                    // 清除全部状态
                    delete workDateInput.dataset.selectAll;
                    updateDateDisplay();
                    
                    // 触发change事件
                    workDateInput.dispatchEvent(new Event('change', { bubbles: true }));
                    
                    // 延迟关闭选择器，让用户看到选择结果
                    setTimeout(() => {
                        hideDatePicker();
                    }, 500);
                }
            } else {
                // 单选模式
                datePickerState.singleSelectedDate = dateStr;
                
                const workDateInput = document.getElementById('workDate');
                workDateInput.value = dateStr;
                delete workDateInput.dataset.displayValue;
                // 清除全部状态
                delete workDateInput.dataset.selectAll;
                updateDateDisplay();
                
                workDateInput.dispatchEvent(new Event('change', { bubbles: true }));
                
                hideDatePicker();
            }
            
            renderCalendar();
        }
        
        // 改变月份
        function changeMonth(delta) {
            const newDate = new Date(datePickerState.displayDate);
            newDate.setMonth(newDate.getMonth() + delta);
            
            // 检查是否超过当前月份
            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth();
            const newYear = newDate.getFullYear();
            const newMonth = newDate.getMonth();
            
            // 如果新日期大于当前年月，则不允许切换
            if (newYear > currentYear || (newYear === currentYear && newMonth > currentMonth)) {
                return; // 不执行切换
            }
            
            datePickerState.displayDate = newDate;
            renderCalendar();
        }
        
        // 格式化日期
        function formatDate(year, month, day) {
            const adjustedMonth = month < 0 ? 11 : (month > 11 ? 0 : month);
            const adjustedYear = month < 0 ? year - 1 : (month > 11 ? year + 1 : year);
            
            const yyyy = adjustedYear;
            const mm = String(adjustedMonth + 1).padStart(2, '0');
            const dd = String(day).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }
        
        // 辅助函数：通过project_id从本地存储获取project_name
        function getProjectNameById(projectId) {
            try {
                // 获取当前登录用户信息
                let currentUser = {};
                let userId = 'default';
                const currentUserStr = localStorage.getItem('currentUser');
                if (currentUserStr) {
                    currentUser = JSON.parse(currentUserStr);
                    userId = currentUser.user_id || 'default';
                }
                
                // 从本地存储获取项目数据
                const projectsData = localStorage.getItem('project_cache_' + userId);
                if (projectsData) {
                    const projects = JSON.parse(projectsData);
                    const project = projects.find(p => p.project_id === projectId);
                    return project ? project.project_name : null;
                }
                return null;
            } catch (error) {
                console.error('通过project_id获取project_name失败:', error);
                return null;
            }
        }
